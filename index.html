<!doctype html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
      <script>
        (function () {
          const hostname = window.location.hostname;
          const userAgent = (navigator && navigator.userAgent) || '';
          const isLocalHost = hostname === 'localhost' || hostname === '127.0.0.1';
          const isPrerenderSnapshot =
            /HeadlessChrome|Prerender/i.test(userAgent) ||
            window.__PRERENDER_INJECTED === true ||
            navigator.webdriver === true;

          const addScript = (src, options) => {
            const script = document.createElement('script');
            script.src = src;
            script.async = true;
            if (options && options.crossOrigin) {
              script.crossOrigin = options.crossOrigin;
            }
            document.head.appendChild(script);
          };

          window.dataLayer = window.dataLayer || [];
          window.gtag = function () { window.dataLayer.push(arguments); };
          window.gtag('js', new Date());

          if (!isPrerenderSnapshot) {
            addScript('https://www.googletagmanager.com/gtag/js?id=G-2HX8HCQR13');
            if (!isLocalHost) {
              window.gtag('config', 'G-2HX8HCQR13');
            }
            addScript('https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1425572131754335', {
              crossOrigin: 'anonymous'
            });
          }
        })();
      </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "d1b81488-8d12-4ec1-92f4-effe26092a0c",
        });
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
