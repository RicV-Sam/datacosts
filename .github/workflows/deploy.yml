name: Build and Deploy Vite App to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_CONFIG_FETCH_RETRIES: 5
  NPM_CONFIG_FETCH_RETRY_FACTOR: 2
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 10000
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

permissions:
  contents: read

concurrency:
  group: datacost-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2; do
            echo "npm ci attempt $attempt"
            if timeout 8m npm ci --no-audit --prefer-offline; then
              exit 0
            fi
            status=$?
            if [ "$status" -eq 124 ]; then
              echo "npm ci attempt $attempt timed out after 8 minutes"
            else
              echo "npm ci attempt $attempt failed with exit code $status"
            fi
            if [ "$attempt" -eq 2 ]; then
              exit 1
            fi
            echo "npm ci failed, clearing npm cache and retrying..."
            npm cache clean --force
            sleep 15
          done

      - name: Lint
        run: npm run lint

      - name: Install Puppeteer Chrome
        shell: bash
        run: |
          browser_cache="$HOME/.cache/puppeteer"
          rm -rf "$browser_cache/chrome" "$browser_cache/chrome-headless-shell"
          for attempt in 1 2; do
            echo "puppeteer browser install attempt $attempt"
            if timeout 8m npx @puppeteer/browsers@2.13.0 install chrome-headless-shell@146.0.7680.153 --path "$browser_cache"; then
              browser_path="$(find "$browser_cache/chrome-headless-shell" -type f -name chrome-headless-shell -print -quit)"
              if [ -z "$browser_path" ]; then
                echo "Could not find installed chrome-headless-shell executable"
                find "$browser_cache" -maxdepth 5 -type f -print
                exit 1
              fi
              echo "Installed Puppeteer Chrome at $browser_path"
              chmod +x "$browser_path"
              if [ ! -x "$browser_path" ]; then
                echo "Installed browser path is not executable: $browser_path"
                exit 1
              fi
              echo "PUPPETEER_EXECUTABLE_PATH=$browser_path" >> "$GITHUB_ENV"
              npx @puppeteer/browsers@2.13.0 list --path "$browser_cache"
              exit 0
            fi
            status=$?
            if [ "$status" -eq 124 ]; then
              echo "puppeteer browser install attempt $attempt timed out after 8 minutes"
            else
              echo "puppeteer browser install attempt $attempt failed with exit code $status"
            fi
            if [ "$attempt" -eq 2 ]; then
              exit 1
            fi
            sleep 15
          done

      - name: Build project
        run: npm run build

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
